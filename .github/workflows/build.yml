name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: [v*]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  PRIVATE_GO_TAGS: esim_transfer,wifi_calling
  PRIVATE_GO_MODFILE: go.private.mod
  PRIVATE_GOPRIVATE: github.com/damonto/*

jobs:
  build:
    name: Build for ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: 386, name: linux-i386 }
          - { arch: amd64, name: linux-amd64 }
          - { arch: amd64, name: linux-amd64-musl, musl: true, libc: libc.musl-x86_64.so.1, interp: /lib/ld-musl-x86_64.so.1 }
          - { arch: arm, name: linux-armhf }
          - { arch: arm, arm: 7, variant: v7, name: linux-armv7-musl, musl: true, libc: libc.musl-armv7.so.1, interp: /lib/ld-musl-armhf.so.1 }
          - { arch: arm64, name: linux-arm64 }
          - { arch: arm64, name: linux-arm64-musl, musl: true, libc: libc.musl-aarch64.so.1, interp: /lib/ld-musl-aarch64.so.1 }
          - { arch: riscv64, name: linux-riscv64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Configure private Go modules
        if: github.event_name != 'pull_request' && vars.SIGMO_PRIVATE_FEATURES == 'true'
        run: |
          go env -w GOPRIVATE="${PRIVATE_GOPRIVATE}"
          git config --global url."https://x-access-token:${{ secrets.SIGMO_PRIVATE_MODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build frontend
        run: |
          cd web
          bun install
          bun run build --mode prod

      - name: Build for ${{ matrix.target.name }}
        env:
          TARGET_ARCH: ${{ matrix.target.arch }}
          TARGET_ARM: ${{ matrix.target.arm }}
          TARGET_VARIANT: ${{ matrix.target.variant }}
          TARGET_MUSL: ${{ matrix.target.musl }}
          PUREGO_MUSL_LIBC: ${{ matrix.target.libc }}
          MUSL_INTERPRETER: ${{ matrix.target.interp }}
        run: |
          set -eu

          go generate ./...
          BUILD_VERSION=$(git describe --always --tags --match "v*" --dirty="-dev")
          modfile="go.mod"
          sumfile="go.sum"
          tags_arg=""
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ vars.SIGMO_PRIVATE_FEATURES }}" = "true" ]; then
            modfile="${PRIVATE_GO_MODFILE}"
            sumfile="${PRIVATE_GO_MODFILE%.mod}.sum"
            tags_arg="-tags=${PRIVATE_GO_TAGS}"
          fi

          ldflags="-w -s -X main.BuildVersion=${BUILD_VERSION}"
          rebuild_arg=""

          if [ "${TARGET_MUSL:-}" = "true" ]; then
            go mod download -modfile="${modfile}"

            purego_tmp="$(mktemp -d)"
            cp -R "$(go list -modfile="${modfile}" -m -f '{{.Dir}}' github.com/ebitengine/purego)" "${purego_tmp}/purego"

            mkdir -p build
            musl_modfile="build/go.${{ matrix.target.name }}.mod"
            musl_sumfile="${musl_modfile%.mod}.sum"
            cp "${modfile}" "${musl_modfile}"
            cp "${sumfile}" "${musl_sumfile}"
            go mod edit -modfile="${musl_modfile}" -replace=github.com/ebitengine/purego="${purego_tmp}/purego"

            TARGETARCH="${TARGET_ARCH}" TARGETVARIANT="${TARGET_VARIANT:-}" PUREGO_MUSL_LIBC="${PUREGO_MUSL_LIBC:-}" scripts/patch-purego-musl.sh "${musl_modfile}"

            modfile="${musl_modfile}"
            ldflags="-I ${MUSL_INTERPRETER} ${ldflags}"
            rebuild_arg="-a"
          fi

          goarm_arg=""
          if [ -n "${TARGET_ARM:-}" ]; then
            goarm_arg="GOARM=${TARGET_ARM}"
          fi

          env GOOS=linux GOARCH="${TARGET_ARCH}" ${goarm_arg} CGO_ENABLED=0 \
            go build ${rebuild_arg} ${tags_arg} -modfile="${modfile}" -trimpath \
              -ldflags="${ldflags}" \
              -o sigmo-${{ matrix.target.name }}

      - name: Verify musl linkage
        if: matrix.target.musl == true
        run: |
          binary="sigmo-${{ matrix.target.name }}"
          file "${binary}"
          readelf -l "${binary}" > program-headers.txt
          readelf -d "${binary}" > dynamic-section.txt || true

          if grep -Fq "Requesting program interpreter:" program-headers.txt; then
            grep -F "Requesting program interpreter: ${{ matrix.target.interp }}" program-headers.txt
          else
            echo "musl binary is statically linked; no program interpreter"
          fi

          if grep -Fq "Shared library:" dynamic-section.txt; then
            grep -F "Shared library: [${{ matrix.target.libc }}]" dynamic-section.txt
          else
            echo "musl binary has no dynamic shared libraries"
          fi

          if grep -E 'libc\.so\.6|libdl\.so\.2|libpthread\.so\.0' dynamic-section.txt; then
            echo "glibc dynamic import remains in musl binary" >&2
            exit 1
          fi

      - name: Upload ${{ matrix.target.name }} to Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sigmo-${{ matrix.target.name }}
          path: sigmo-${{ matrix.target.name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "*"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*"
